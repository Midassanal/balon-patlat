<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0b1026; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #game { position:relative; width:100%; height:100%; max-width:520px; margin:0 auto;

  canvas { display:block; width:100%; height:100%; touch-action:none; }

  #hud { position:absolute; top:0; left:0; right:0; padding:10px 12px; display:flex; flex-direction:column;
         gap:6px; pointer-events:none; z-index:5; }
  .row { display:flex; justify-content:space-between; align-items:center; }
  .chip { background:rgba(0,0,0,.32); backdrop-filter:blur(6px); border-radius:14px; padding:6px 12px;
          color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px;
          box-shadow:0 2px 8px rgba(0,0,0,.2); }
  .chip small { font-weight:600; opacity:.75; font-size:11px; }
  #timebar-wrap { height:10px; background:rgba(0,0,0,.3); border-radius:6px; overflow:hidden; margin-top:2px; }
  #timebar { height:100%; width:100%; background:linear-gradient(90deg,#4ade80,#facc15); transition:width .15s linear; }
  #scorebar-wrap { height:8px; background:rgba(0,0,0,.3); border-radius:6px; overflow:hidden; }
  #scorebar { height:100%; width:0%; background:linear-gradient(90deg,#38bdf8,#a78bfa); transition:width .2s ease; }
  .barlabel { color:#fff; font-size:12px; font-weight:700; opacity:.95; padding:0 3px;
              text-shadow:0 1px 2px rgba(0,0,0,.4); }
  .barlabel #scorebar { }
  #target { align-self:center; background:rgba(0,0,0,.32); border-radius:16px; padding:7px 16px; color:#fff;
            font-weight:800; font-size:14px; display:flex; align-items:center; gap:8px; margin-top:2px; }
  .swatch { width:18px; height:18px; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.6); }

               transition:width .15s ease; }
  #banner { position:absolute; top:38%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:8;
            font-weight:900; font-size:38px; text-align:center; pointer-events:none; line-height:1.1;
            text-shadow:0 4px 16px rgba(0,0,0,.6); white-space:nowrap; }
  #frenzy-flash { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0;
                  background:radial-gradient(circle at 50% 60%, rgba(255,180,40,.0), rgba(255,80,40,.0));
                  mix-blend-mode:screen; }

  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
             text-align:center; padding:28px; z-index:10; background:rgba(8,10,30,.72); backdrop-filter:blur(8px); }
  .overlay.hidden { display:none; }
  .panel { background:linear-gradient(160deg,#26306e,#3a2470); border-radius:26px; padding:30px 26px;

  .label { color:#aeb6ff; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
  .btn { margin-top:18px; background:linear-gradient(180deg,#ffd23f,#ff9f1c); color:#5a2d00; border:none;

         box-shadow:0 6px 0 #c9760a,0 10px 20px rgba(0,0,0,.3); transition:transform .08s,box-shadow .08s; pointer-events:auto; }

  .btn.alt { background:linear-gradient(180deg,#7dd3fc,#38bdf8); color:#063; box-shadow:0 6px 0 #0d6ea8,0 10px 20px rgba(0,0,0,.3); }
  .legend { display:flex; flex-direction:column; gap:9px; margin:14px 0 4px; text-align:left; }
  .legend div { color:#e6e9ff; font-size:13.5px; display:flex; align-items:center; gap:10px; line-height:1.3; }
  .dot { width:20px; height:20px; border-radius:50%; flex:0 0 20px; box-shadow:0 0 0 2px rgba(255,255,255,.35); }
  .best { color:#ffe06b; font-weight:800; font-size:16px; margin-top:6px; }
  #nameInput { width:100%; margin:4px 0 10px; padding:13px 16px; border:none; border-radius:14px;

               background:rgba(255,255,255,.92); outline:none; box-shadow:inset 0 2px 6px rgba(0,0,0,.15); }
  #nameInput::placeholder { color:#9aa0c0; font-weight:600; }
  .btn.small { font-size:16px; padding:11px 26px; margin-top:10px; }
  .board { display:flex; flex-direction:column; gap:5px; margin:10px 0 4px; max-height:300px; overflow-y:auto; }
  .brow { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:12px;
          background:rgba(255,255,255,.07); color:#e6e9ff; font-size:14px; }
  .brow.me { background:linear-gradient(90deg,#ffd23f,#ff9f1c); color:#4a2600; font-weight:900;

  .brow .lv { opacity:.85; font-size:12px; flex:0 0 auto; }
  .brow .pts { font-weight:900; flex:0 0 auto; min-width:54px; text-align:right; }
  .board .empty { color:#aeb6ff; font-size:14px; padding:14px; }
  .langbar { display:flex; gap:6px; justify-content:center; margin-bottom:12px; }
  .langbar button { background:rgba(255,255,255,.12); color:#dfe3ff; border:none; border-radius:10px;
                    padding:6px 12px; font-size:13px; font-weight:800; cursor:pointer; pointer-events:auto; }
  .langbar button.active { background:linear-gradient(180deg,#ffd23f,#ff9f1c); color:#5a2d00; }

  .sky-deco .sun { position:absolute; top:18px; right:24px; width:54px; height:54px; border-radius:50%;

  .sky-deco .cloud { position:absolute; border-radius:20px; background:rgba(255,255,255,.8); }
  .sky-deco .bal { position:absolute; width:30px; height:38px; border-radius:50%; opacity:.9; }
  .sky-deco .bal svg { position:absolute; left:50%; top:100%; transform:translateX(-50%); width:10px; height:18px; }
  .sky-deco .bal svg path { fill:none; stroke:rgba(0,0,0,.5); stroke-width:1.5; }
  .start-inner { position:relative; z-index:2; width:100%; max-width:380px; display:flex; flex-direction:column; }

  .tabs { display:flex; gap:6px; background:rgba(255,255,255,.22); border-radius:14px; padding:4px; margin-bottom:14px; }
  .gtab { flex:1; border:none; border-radius:11px; padding:10px 0; font-size:15px; font-weight:800;
          cursor:pointer; background:transparent; color:#fff; pointer-events:auto; }
  .gtab.active { background:#fff; color:#2a1a5a; box-shadow:0 2px 6px rgba(0,0,0,.12); }
  .gpanel { display:flex; flex-direction:column; text-align:left; }
  .flabel { font-size:12px; font-weight:800; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4); margin:2px 2px 5px; }

  .start-inner .sub { color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4); margin-bottom:8px; text-align:center; }
  .start-inner .best { color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4); margin-top:12px; text-align:center; }
  #startScreen .brow { background:rgba(255,255,255,.9); color:#2a2a3a; }

  @keyframes pop { 0%{transform:scale(.3)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }

</head>

let AC=null, soundOn=true;
function audio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(freq,dur,type,vol,slideTo){
  if(!soundOn) return; const a=audio(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
  g.gain.value=vol||0.15; g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
function sPop(p){ beep(420+Math.random()*120+p*40,0.12,'triangle',0.18,180); }

// ---------- Background music (tropical marimba loop) ----------
let musicTimer=null, musicStep=0, musicBaseTempo=150, musicGain=null;
// melodic marimba arpeggios over a sunny C–G–Am–F progression (32 sixteenths)
const LEAD=[523,659,784,1046,784,659,523,659,
            392,494,587,784,587,494,392,494,
            440,523,659,880,659,523,440,523,
            349,440,523,698,523,440,349,440];
const BASS=[131,0,0,0,131,0,98,0, 98,0,0,0,98,0,98,0,
            110,0,0,0,110,0,110,0, 87,0,0,0,87,0,98,0];
// soft marimba: triangle fundamental + faint octave, quick mallet decay
function marimba(freq,dur,vol){
  if(!soundOn||!freq) return; const a=audio(); if(!a||!musicGain) return;
  const o1=a.createOscillator(), o2=a.createOscillator(), g=a.createGain(), g2=a.createGain();
  o1.type='triangle'; o1.frequency.value=freq;
  o2.type='sine'; o2.frequency.value=freq*2.005; g2.gain.value=0.35;
  g.gain.setValueAtTime(0.0001,a.currentTime);
  g.gain.exponentialRampToValueAtTime(vol,a.currentTime+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
  o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(musicGain);
  o1.start(); o2.start(); o1.stop(a.currentTime+dur); o2.stop(a.currentTime+dur);
}
// gentle shaker on the offbeat
function shaker(vol){
  if(!soundOn) return; const a=audio(); if(!a||!musicGain) return;
  const b=a.createBuffer(1,512,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<512;i++) d[i]=Math.random()*2-1;
  const s=a.createBufferSource(); s.buffer=b;
  const f=a.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
  const g=a.createGain(); g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.06);
  s.connect(f); f.connect(g); g.connect(musicGain); s.start(); s.stop(a.currentTime+0.06);
}
function scheduleMusic(tempo){
  stopMusic();
  musicTimer=setInterval(()=>{
    if(!soundOn) return;
    const i=musicStep%LEAD.length;
    marimba(LEAD[i], tempo/1000*1.8, 0.10);                 // melody
    if(i%4===0) marimba(LEAD[i]*0.5, tempo/1000*2.2, 0.05); // soft harmony octave-down
    if(BASS[i]) marimba(BASS[i], tempo/1000*2.6, 0.13);     // bass
    if(i%2===1) shaker(0.05);                                // offbeat shaker
    musicStep++;
  }, tempo);
}
function startMusic(){
  const a=audio(); if(!a) return;
  if(!musicGain){ musicGain=a.createGain(); musicGain.gain.value=0.5; musicGain.connect(a.destination); }
  musicStep=0;
  musicBaseTempo = Math.max(120, 165 - (level-1)*5); // mellow, eases up a touch per level
  scheduleMusic(frenzyActive ? musicBaseTempo*0.6 : musicBaseTempo);
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

// ---------- Balloon ----------
function spawn(){
  const r = 30 + Math.random()*16;
  const x = r+10 + Math.random()*(W-2*r-20);
  let type='normal', colorIdx=Math.floor(Math.random()*COLORS.length);
  const roll=Math.random();
  // make target color more frequent so player has chances
  if(Math.random()<0.4) colorIdx=targetColorIdx;
  if(roll<0.05) type='rainbow';
  else if(roll<0.05+Math.min(0.10,0.04+level*0.008)) type='black';
  else if(roll<0.05+0.10+0.06) type='power';
  let power=null;
  if(type==='power') power=['time','slow','bomb'][Math.floor(Math.random()*3)];
  balloons.push({
    x,y:H+r+10,r,type,colorIdx,power,
    vy:-(0.55+Math.random()*0.35),
    sway:Math.random()*Math.PI*2, swaySpd:0.5+Math.random()*0.8, swayAmp:8+Math.random()*14,
    dead:false, pscale:1, born:performance.now()
  });
}

function popBalloon(b, byRainbow){
  if(b.dead) return; b.dead=true;
  const c = b.type==='normal'||b.type==='black' ? COLORS[b.colorIdx] : null;

  if(b.type==='black' && !byRainbow){
    // penalty: wipe level score
    score -= levelScore; if(score<0) score=0;
    levelScore=0; comboCount=0;
    burst(b.x,b.y,'#222',26); shake=18; sBad(); vibrate([60,40,60]);
    floater(b.x,b.y,t('wiped'),'#ff5a5f',22);
    updateScoreBar(); return;
  }

  if(b.type==='rainbow' && !byRainbow){
    sRainbow(); shake=10; vibrate(40);
    floater(b.x,b.y,t('rainbow'),'#fff',26);
    burst(b.x,b.y,'#fff',30);
    balloons.forEach(o=>{ if(!o.dead && o!==b && o.type!=='black') popBalloon(o,true); });
    return;
  }

  if(b.type==='power'){
    sPower(); shake=6; vibrate(30);
    if(b.power==='time'){ timeLeft=Math.min(levelTime,timeLeft+6); floater(b.x,b.y,t('tPlus'),'#7dd3fc',22); }
    if(b.power==='slow'){ slowUntil=performance.now()+5000; floater(b.x,b.y,t('slow'),'#22d3ee',22); }
    if(b.power==='bomb'){ floater(b.x,b.y,t('bomb'),'#ff9f1c',22);
      balloons.forEach(o=>{ if(!o.dead&&o!==b&&o.type!=='black'&&Math.hypot(o.x-b.x,o.y-b.y)<150) popBalloon(o,true); }); }
    burst(b.x,b.y,'#fff',22); return;
  }

  // normal colored balloon
  comboCount++; comboTimer=performance.now()+1200;
  const mult=Math.min(5,1+Math.floor(comboCount/3));
  let pts=10;
  const isTarget = b.colorIdx===targetColorIdx;
  if(isTarget){ pts=25; sTarget(); } else { sPop(b.colorIdx); }
  pts*=mult;
  if(frenzyActive) pts*=2;
  score+=pts; levelScore+=pts;
  burst(b.x,b.y,frenzyActive?'#ffb020':c.hex,frenzyActive?22:16);
  floater(b.x,b.y,'+'+pts,isTarget||frenzyActive?'#ffe06b':'#fff',isTarget?22:18);
  if(mult>1) showCombo(mult);
  vibrate(15);
  if(!frenzyActive){ frenzyCharge++; if(frenzyCharge>=frenzyMax) triggerFrenzy(); updateFrenzy(); }
  updateScoreBar();
}

// ---------- Frenzy mode ----------
function updateFrenzy(){
  const bar=document.getElementById('frenzyBar'), txt=document.getElementById('frenzyTxt');
  if(frenzyActive){ bar.style.width='100%'; txt.textContent=t('frenzyActive'); }
  else { bar.style.width=Math.min(100,(frenzyCharge/frenzyMax)*100)+'%';
    txt.textContent=Math.floor((frenzyCharge/frenzyMax)*100)+'%'; }
}
function triggerFrenzy(){
  frenzyActive=true; frenzyUntil=performance.now()+7000; frenzyCharge=0;
  spawnGap=Math.max(220, baseSpawnGap*0.55);
  banner('🔥 FRENZY! 🔥',t('frenzy2'),'#ff7a18');
  sRainbow(); vibrate([30,30,30,30,60]); shake=12;
  if(soundOn){ musicStep=0; scheduleMusic(musicBaseTempo*0.6); }
  updateFrenzy();
}
function endFrenzy(){
  frenzyActive=false; frenzyCharge=0; spawnGap=baseSpawnGap;
  if(soundOn) scheduleMusic(musicBaseTempo);
  updateFrenzy();
}
function banner(line1,line2,color){
  const el=document.getElementById('banner');
  el.style.color=color||'#fff';
  el.innerHTML=line1+(line2?'<br><span style="font-size:22px">'+line2+'</span>':'');
  el.style.transition='none'; el.style.transform='translate(-50%,-50%) scale(0)'; el.style.opacity='1';
  requestAnimationFrame(()=>{ el.style.transition='transform .3s cubic-bezier(.2,1.4,.4,1),opacity .5s';
    el.style.transform='translate(-50%,-50%) scale(1)';
    setTimeout(()=>{ el.style.opacity='0'; },1100); });
}

// ---------- Boss ----------
function spawnBoss(){
  const hp=7+level;
  boss={ x:W/2, y:H*0.32, r:64, hp, maxhp:hp, vx:(1+level*0.12)*(Math.random()<.5?-1:1),
         bob:Math.random()*Math.PI*2, hitFlash:0 };
  banner(t('boss'),t('bossSub'),'#ffd23f');
}
function hitBoss(){
  boss.hp--; boss.hitFlash=8; shake=10; vibrate(20);
  let pts=20; if(frenzyActive) pts*=2;
  score+=pts; levelScore+=pts; sPop(2);
  burst(boss.x,boss.y,'#ffd23f',12); floater(boss.x,boss.y-boss.r,'+'+pts,'#ffe06b',20);
  if(!frenzyActive){ frenzyCharge++; if(frenzyCharge>=frenzyMax) triggerFrenzy(); updateFrenzy(); }
  if(boss.hp<=0){
    let bonus=200+level*30; if(frenzyActive) bonus*=2;
    score+=bonus; levelScore+=bonus;
    banner(t('bossDown'),'+'+bonus,'#4ade80');
    sRainbow(); shake=20; vibrate([60,40,80]);
    burst(boss.x,boss.y,'#ffd23f',40);
    boss=null; bossRespawn=performance.now()+2600;
  }
  updateScoreBar();
}

function showCombo(m){
  const el=document.getElementById('combo');
  el.textContent=t('combo',{m:m});
  el.style.transition='none'; el.style.transform='translate(-50%,-50%) scale(0)'; el.style.opacity='1';
  requestAnimationFrame(()=>{ el.style.transition='transform .25s,opacity .5s';
    el.style.transform='translate(-50%,-50%) scale(1)';
    setTimeout(()=>{ el.style.opacity='0'; },350); });
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,r:2+Math.random()*4,color});
  }
}
function floater(x,y,text,color,size){ floaters.push({x,y,text,color,size:size||18,life:1}); }

// ---------- Input ----------
function hit(px,py){
  if(boss){ const bx=px-boss.x, by=py-boss.y;
    if(bx*bx+by*by <= (boss.r+8)*(boss.r+8)){ hitBoss(); return; } }
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    if(b.dead) continue;
    const dx=px-b.x, dy=py-b.y;
    if(dx*dx+dy*dy <= (b.r+6)*(b.r+6)){ popBalloon(b,false); return; }
  }
}
function pos(e){ const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left, y:t.clientY-r.top}; }
cv.addEventListener('pointerdown',e=>{ if(!running) return; audio(); const p=pos(e); hit(p.x,p.y); },{passive:false});

// ---------- Drawing ----------
function drawBalloon(b){
  const t=performance.now();
  const x=b.x + Math.sin(b.sway)*b.swayAmp;
  const y=b.y, r=b.r;
  ctx.save();
  ctx.translate(x,y); ctx.scale(b.pscale||1,b.pscale||1);
  // string
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,r); ctx.quadraticCurveTo(6,r+18,0,r+34); ctx.stroke();

  let main,light;
  if(b.type==='rainbow'){
    const g=ctx.createLinearGradient(-r,-r,r,r);
    g.addColorStop(0,'#ff5a5f'); g.addColorStop(.25,'#ffd23f'); g.addColorStop(.5,'#4ade80');
    g.addColorStop(.75,'#38bdf8'); g.addColorStop(1,'#a78bfa');
    main=g; light='#ffffff';
  } else if(b.type==='black'){
    main='#1a1a1a'; light='#555';
  } else if(b.type==='power'){
    main='#0ea5e9'; light='#e0f2fe';
  } else { main=COLORS[b.colorIdx].hex; light=COLORS[b.colorIdx].light; }

  // body
  const grad=ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1,0,0,r*1.1);
  if(typeof main==='string'){ grad.addColorStop(0,light); grad.addColorStop(.5,main); grad.addColorStop(1,shade(main)); ctx.fillStyle=grad; }
  else ctx.fillStyle=main;
  ctx.beginPath(); ctx.ellipse(0,0,r*0.92,r,0,0,Math.PI*2); ctx.fill();
  // knot
  ctx.fillStyle = typeof main==='string'?shade(main):'#444';
  ctx.beginPath(); ctx.moveTo(-5,r-2); ctx.lineTo(5,r-2); ctx.lineTo(0,r+6); ctx.fill();
  // glossy highlight
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath(); ctx.ellipse(-r*0.3,-r*0.38,r*0.22,r*0.32,-0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.ellipse(r*0.3,r*0.25,r*0.12,r*0.2,0.4,0,Math.PI*2); ctx.fill();

  // icons / outlines
  if(b.type==='black'){
    ctx.fillStyle='#fff'; ctx.font='bold '+(r*0.9)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('☠', 0, 0);
  } else if(b.type==='power'){
    ctx.fillStyle='#fff'; ctx.font='bold '+(r*0.95)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.power==='time'?'⏱':b.power==='slow'?'❄':'💣',0,0);
  } else if(b.type==='normal' && b.colorIdx===targetColorIdx){
    // pulsing ring for target color
    const pulse=0.5+0.5*Math.sin(t/200);
    ctx.strokeStyle='rgba(255,255,255,'+(0.5+pulse*0.5)+')'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(0,0,r*0.92+3,r+3,0,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
  b._drawX=x; // record for hit drawing (logic uses b.x though)
}
function shade(hex){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=r*0.6|0; g=g*0.6|0; b=b*0.6|0; return 'rgb('+r+','+g+','+b+')';
}

// ---------- Animated sky themes ----------
const THEMES=[
  {name:'Güneşli', top:'#3aa0ff', bot:'#bfe9ff', cloud:'rgba(255,255,255,.92)', sun:'#fff3b0', snow:false, stars:false},
  {name:'Bulutlu', top:'#7d8ea6', bot:'#c4cedd', cloud:'rgba(245,248,252,.95)', sun:null,      snow:false, stars:false},
  {name:'Gün Batımı', top:'#ff7a52', bot:'#ffd9a0', cloud:'rgba(255,224,205,.9)', sun:'#fff0c2', snow:false, stars:false},
  {name:'Gece', top:'#0a1340', bot:'#27315f', cloud:'rgba(60,70,110,.6)', sun:null, moon:true, snow:false, stars:true},
  {name:'Karlı', top:'#6f86b0', bot:'#d6e2f2', cloud:'rgba(240,245,252,.95)', sun:null, snow:true, stars:false}
];
let theme=THEMES[0], bgClouds=[], bgStars=[], bgSnow=[], sunAngle=0;
function setTheme(n){
  theme=THEMES[(n-1)%THEMES.length];
  bgClouds=[]; bgStars=[]; bgSnow=[];
  const nc=3+Math.floor(Math.random()*3);
  for(let i=0;i<nc;i++) bgClouds.push({x:Math.random()*W, y:40+Math.random()*(H*0.5),
    s:0.6+Math.random()*0.9, v:0.12+Math.random()*0.25});
  if(theme.stars) for(let i=0;i<60;i++) bgStars.push({x:Math.random()*W, y:Math.random()*H*0.7,
    r:0.6+Math.random()*1.6, ph:Math.random()*Math.PI*2});
  if(theme.snow) for(let i=0;i<70;i++) bgSnow.push({x:Math.random()*W, y:Math.random()*H,
    r:1.5+Math.random()*3, v:0.5+Math.random()*1.2, drift:Math.random()*Math.PI*2});
  // update game container fallback tint
  document.getElementById('game').style.background=
    'linear-gradient(180deg,'+theme.top+' 0%,'+theme.bot+' 100%)';
}
function drawCloud(cx,cy,s,color){
  ctx.fillStyle=color;
  const puffs=[[0,0,1],[-22,4,0.8],[22,4,0.8],[-10,-8,0.7],[12,-9,0.7],[0,8,0.9]];
  for(const p of puffs){ ctx.beginPath();
    ctx.ellipse(cx+p[0]*s, cy+p[1]*s, 24*s*p[2], 18*s*p[2], 0,0,Math.PI*2); ctx.fill(); }
}
function drawBackground(now,dt){
  // sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,theme.top); g.addColorStop(1,theme.bot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // stars
  if(theme.stars) for(const st of bgStars){ st.ph+=dt*0.004;
    ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(st.ph)); ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
  // moon
  if(theme.moon){ ctx.fillStyle='#f5f3d0'; ctx.beginPath(); ctx.arc(W-60,70,28,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=theme.top; ctx.beginPath(); ctx.arc(W-48,62,24,0,Math.PI*2); ctx.fill(); }
  // sun with rotating rays
  if(theme.sun){ sunAngle+=dt*0.0006; const sx=W-64, sy=72, R=30;
    ctx.save(); ctx.translate(sx,sy);
    ctx.strokeStyle='rgba(255,240,150,.5)'; ctx.lineWidth=4;
    for(let i=0;i<12;i++){ const a=sunAngle+i*Math.PI/6;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*(R+8),Math.sin(a)*(R+8));
      ctx.lineTo(Math.cos(a)*(R+22),Math.sin(a)*(R+22)); ctx.stroke(); }
    const sg=ctx.createRadialGradient(0,0,4,0,0,R);
    sg.addColorStop(0,'#fff7d6'); sg.addColorStop(1,theme.sun);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  // clouds
  for(const c of bgClouds){ c.x+=c.v*dt/16; if(c.x-60*c.s>W) c.x=-60*c.s;
    drawCloud(c.x,c.y,c.s,theme.cloud); }
  // snow
  if(theme.snow) for(const f of bgSnow){ f.drift+=0.02; f.y+=f.v*dt/16; f.x+=Math.sin(f.drift)*0.4;
    if(f.y>H+5){ f.y=-5; f.x=Math.random()*W; }
    ctx.globalAlpha=0.85; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
}

// ---------- Boss drawing ----------
function drawBoss(now){
  const b=boss, r=b.r, x=b.x, y=b.y;
  ctx.save(); ctx.translate(x,y);
  const wob=1+0.04*Math.sin(now/180);
  ctx.scale(wob, 2-wob);
  // string
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,r); ctx.quadraticCurveTo(12,r+30,0,r+56); ctx.stroke();
  // body
  const flash=b.hitFlash>0;
  const grad=ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1,0,0,r*1.1);
  grad.addColorStop(0, flash?'#fff':'#ff8aa0');
  grad.addColorStop(.5, flash?'#ffd23f':'#e23b6d');
  grad.addColorStop(1, flash?'#ff9f1c':'#9b1b48');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.ellipse(0,0,r*0.94,r,0,0,Math.PI*2); ctx.fill();
  // knot
  ctx.fillStyle='#9b1b48'; ctx.beginPath(); ctx.moveTo(-7,r-3); ctx.lineTo(7,r-3); ctx.lineTo(0,r+8); ctx.fill();
  // highlight
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(-r*0.32,-r*0.4,r*0.2,r*0.3,-0.5,0,Math.PI*2); ctx.fill();
  // angry eyes + mouth
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(-r*0.32,-r*0.1,r*0.12,r*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r*0.32,-r*0.1,r*0.12,r*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.42); ctx.lineTo(-r*0.16,-r*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.5,-r*0.42); ctx.lineTo(r*0.16,-r*0.28); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,r*0.42,r*0.34,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
  ctx.restore();
  // HP bar
  const bw=r*2.1, bh=10, bx=x-bw/2, by=y-r-26;
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#3a3a3a'; ctx.fillRect(bx,by,bw,bh);
  const hpf=Math.max(0,b.hp/b.maxhp);
  ctx.fillStyle = hpf>0.5?'#4ade80':hpf>0.25?'#facc15':'#ef4444';
  ctx.fillRect(bx,by,bw*hpf,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('BOSS  '+b.hp+'/'+b.maxhp, x, by-6);
}

// ---------- Loop ----------
function tick(now){
  if(!running){ return; }
  const dt=Math.min(50, now-lastTime); lastTime=now;
  const slow = now<slowUntil ? 0.45 : 1;

  // time runs all the way down regardless of score; level ends only when time is up
  timeLeft -= dt/1000;
  const tb=document.getElementById('timebar');
  tb.style.width=Math.max(0,(timeLeft/levelTime)*100)+'%';
  document.getElementById('timeText').textContent=Math.max(0,Math.ceil(timeLeft))+t('sec');
  // turn time bar red in the final seconds
  tb.style.background = timeLeft<=5 ? 'linear-gradient(90deg,#f87171,#ef4444)'
                                    : 'linear-gradient(90deg,#4ade80,#facc15)';
  if(timeLeft<=0){
    if(levelScore>=targetScore){ passLevel(); }
    else { gameOver(t('timeUp',{target:targetScore, score:levelScore})); }
    return;
  }

  // frenzy timeout
  if(frenzyActive && now>frenzyUntil) endFrenzy();

  // boss handling
  if(isBossLevel){
    if(!boss && now>bossRespawn) spawnBoss();
    if(boss){
      boss.x += boss.vx*dt/16;
      if(boss.x < boss.r+6){ boss.x=boss.r+6; boss.vx*=-1; }
      if(boss.x > W-boss.r-6){ boss.x=W-boss.r-6; boss.vx*=-1; }
      boss.bob += dt*0.003;
      boss.y = H*0.30 + Math.sin(boss.bob)*16;
      if(boss.hitFlash>0) boss.hitFlash--;
    }
  }

  // spawn
  if(now-lastSpawn>spawnGap){ spawn(); lastSpawn=now; }

  // combo expire
  if(comboCount>0 && now>comboTimer) comboCount=0;

  // update balloons
  for(const b of balloons){
    if(b.dead){ b.pscale=(b.pscale||1)+0.25; continue; }
    b.sway += b.swaySpd*dt/1000;
    b.y += b.vy*speedMul*slow*dt/16;
    if(b.y < -b.r-40){ b.dead=true; b._escaped=true; } // floated off top
  }
  balloons = balloons.filter(b=> !(b.dead && (b._escaped || (b.pscale||1)>1.6)) );

  // particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.025; }
  particles=particles.filter(p=>p.life>0);
  for(const f of floaters){ f.y-=0.8; f.life-=0.02; }
  floaters=floaters.filter(f=>f.life>0);

  // render
  ctx.clearRect(0,0,W,H);
  drawBackground(now,dt);
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.85; if(shake<0.5)shake=0; }
  // frenzy glow overlay
  if(frenzyActive){ const pul=0.12+0.10*Math.sin(now/90);
    ctx.fillStyle='rgba(255,140,30,'+pul+')'; ctx.fillRect(0,0,W,H); }
  if(boss) drawBoss(now);
  for(const b of balloons) if(!b.dead||b.pscale<1.6) drawBalloon(b);
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const f of floaters){ ctx.globalAlpha=Math.max(0,f.life); ctx.fillStyle=f.color;
    ctx.font='bold '+f.size+'px sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=3; ctx.strokeText(f.text,f.x,f.y); ctx.fillText(f.text,f.x,f.y); }
  ctx.globalAlpha=1;
  ctx.restore();

  if(score>best){ best=score; localStorage.setItem('balonBest',best); setBest(); }

  requestAnimationFrame(tick);
}

function passLevel(){
  running=false; stopMusic(); sLevel(); vibrate([40,60,40]);
  document.getElementById('levelDoneScore').textContent=score;
  document.getElementById('levelNextInfo').textContent=
    t('nextInfo',{lv:level+1, theme:t('themeNames')[level%THEMES.length], pts:200+level*120});
  show('levelScreen');
}
function gameOver(reason){
  running=false; stopMusic(); sOver(); vibrate(200);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('bestOver').textContent=t('best')+best;
  document.getElementById('overReason').textContent=reason||'';
  document.getElementById('overTitle').textContent= t('endedAt',{lv:level});
  const ov=document.getElementById('overBoard'); ov.innerHTML='<div class="empty">'+t('loading')+'</div>';
  recordScore().then(()=> showBoard(ov, 8, true));
  show('overScreen');
}

// ---------- Overlay control ----------
const SCREENS=['startScreen','levelScreen','overScreen'];
function show(id){ SCREENS.forEach(s=> document.getElementById(s).classList.toggle('hidden', s!==id)); }
function hideAll(){ SCREENS.forEach(s=> document.getElementById(s).classList.add('hidden')); }

// start-screen tabs
function showStartTab(name){
  document.querySelectorAll('#startScreen .gpanel').forEach(p=>{
    p.style.display = p.getAttribute('data-panel')===name?'flex':'none'; });
  document.querySelectorAll('#startTabs .gtab').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-tab')===name); });
  if(name==='board') showBoard(document.getElementById('boardList'), 15, false);
}

function startLevel(n){
  balloons=[]; particles=[]; floaters=[]; comboCount=0;
  configLevel(n); setTheme(n);
  hideAll(); running=true; lastTime=performance.now(); lastSpawn=0; slowUntil=0;
  startMusic();
  requestAnimationFrame(tick);
}
function newGame(){
  const inp=document.getElementById('nameInput');
  playerName=(inp.value||'').trim().slice(0,12) || playerName || 'Oyuncu';
  localStorage.setItem('balonName', playerName); inp.value=playerName;
  score=0; startLevel(1);
}

// init name field + language
(function(){ const inp=document.getElementById('nameInput'); if(playerName) inp.value=playerName; })();
applyI18n();
showStartTab('play');

const langBtns=document.querySelectorAll('#langbar button');
for(const b of langBtns) b.onclick=()=> setLang(b.getAttribute('data-lang'));

  b.onclick=()=> showStartTab(b.getAttribute('data-tab')));

const csel=document.getElementById('countrySelect');
if(csel) csel.onchange=()=>{ playerCountry=csel.value; localStorage.setItem('balonCountry',playerCountry); };

document.getElementById('playBtn').onclick=()=>{ audio(); newGame(); };
document.getElementById('retryBtn').onclick=()=>{ audio(); newGame(); };
document.getElementById('nextBtn').onclick=()=>{ audio(); startLevel(level+1); };

})();
